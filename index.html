<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Quiz</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="quiz-app">

<h1>Smart Quiz</h1>

<!-- Topic Selection -->

<div id="topicBox">

<h2>Select Quiz Topic</h2>

<button onclick="startQuiz('web')">Web Development</button>

<button onclick="startQuiz('gk')">General Knowledge</button>

<button onclick="startQuiz('science')">Science</button>

</div>


<!-- Quiz Area -->

<div id="quizBox" class="hidden">

<div class="progress-container">
<div id="progressBar"></div>
</div>

<div class="timer">
⏳ Time Left: <span id="time">15</span>s
</div>

<h2 id="question"></h2>

<div id="options"></div>

<input type="text" id="fillInput">

<div id="feedback"></div>

<button id="nextBtn">Next</button>

</div>


<!-- Result -->

<div id="resultBox" class="hidden">

<h2>Quiz Finished 🎉</h2>

<p id="score"></p>

<button onclick="location.reload()">Play Again</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
